<!DOCTYPE html>
<html lang="zh-Hant">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Brokerage Ranking</title>
  <link rel="stylesheet" href="style.css">
</head>
<body>
<header>
  <h1>Brokerage Ranking</h1>
  <sub>OtherNote › brokerage (B1:E12) | Day trading top 10 stocks</sub>
</header>
<div class="statusbar">
  <div class="dot" id="dot"></div>
  <span id="statusMsg">Loading…</span>
</div>
<main>
  <div class="card">
    <div class="card-head">
      <h2>Brokerage Ranking</h2>
      <span id="rowCount"></span>
    </div>
    <div class="tbl-wrap">
      <table>
        <thead id="thead"></thead>
        <tbody id="tbody"></tbody>
      </table>
    </div>
  </div>
</main>
<footer>Data source: Google Sheets › brokerage (read-only)</footer>

<script>
  const API_KEY        = 'AIzaSyCQjHQbMlSYHLWWFNhqCwy4u3zisCyknqo';
  const SPREADSHEET_ID = '1pljY-of-ICBP8WQVgg8l5ICSpL3F6rMs3B8XJXdP2t4';
  const RANGE          = 'brokerage!B1:E12';

  const SEED = [
    ['Date', 'Code', 'Name', 'Reason'],
  ];

  async function loadData() {
    setDot('spin'); setStatus('Loading data from Google Sheets…');
    try {
      const url = `https://sheets.googleapis.com/v4/spreadsheets/${SPREADSHEET_ID}/values/${encodeURIComponent(RANGE)}?key=${API_KEY}`;
      const res  = await fetch(url);
      const json = await res.json();
      if (!res.ok) throw new Error(json.error?.message || `HTTP ${res.status}`);
      const vals = (json.values || []).slice(0, 12);
      if (!vals.length) throw new Error('Sheet returned no data');
      renderTable(vals);
      setDot('ok'); setStatus(`${vals.length - 1} rows loaded from Google Sheets`);
    } catch (err) {
      renderTable(SEED.slice(0, 12));
      setDot('warn'); setStatus(`Showing cached data (${err.message})`);
    }
  }

  function renderTable(data) {
    const cols      = data[0];
    const rows      = data.slice(1);

    document.getElementById('thead').innerHTML =
      '<tr>' + cols.map(h => `<th>${esc(h)}</th>`).join('') + '</tr>';

    document.getElementById('tbody').innerHTML = rows.map(row => {
      const cells = cols.map((_, i) => {
        const v   = row[i] ?? '';
        return `<td>${esc(v)}</td>`;
      }).join('');
      return `<tr>${cells}</tr>`;
    }).join('');

    document.getElementById('rowCount').textContent = rows.length + ' rows';
  }

  function setDot(s) {
    document.getElementById('dot').className =
      'dot' + (s === 'spin' ? ' spin' : s === 'warn' ? ' warn' : '');
  }
  function setStatus(msg) { document.getElementById('statusMsg').textContent = msg; }
  function esc(s) {
    return String(s ?? '')
      .replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;');
  }

  loadData();
</script>
</body>
</html>
