<!DOCTYPE html>
<html lang="zh-Hant">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Brokerage Ranking</title>
  <link rel="stylesheet" href="style.css">
</head>
<body>
<header>
  <h1>Brokerage Ranking</h1>
  <sub>OtherNote › brokerage (A1:E12) | Day trading top 10 stocks</sub>
</header>
<div class="statusbar">
  <div class="dot" id="dot"></div>
  <span id="statusMsg">Loading…</span>
</div>
<main>
  <div class="card">
    <div class="card-head">
      <h2>Brokerage Ranking</h2>
      <span id="rowCount"></span>
    </div>
    <div class="tbl-wrap">
      <table>
        <thead id="thead"></thead>
        <tbody id="tbody"></tbody>
      </table>
    </div>
  </div>
</main>
<footer>Data source: Google Sheets › brokerage (read-only)</footer>

<script>
  const API_KEY        = 'AIzaSyCQjHQbMlSYHLWWFNhqCwy4u3zisCyknqo';
  const SPREADSHEET_ID = '1pljY-of-ICBP8WQVgg8l5ICSpL3F6rMs3B8XJXdP2t4';
  const RANGE          = 'brokerage!A1:E12';

  const SEED = [
    ['Date', 'Code', 'Name', 'Reason'],
  ];

  async function loadData() {
    setDot('spin'); setStatus('Loading data from Google Sheets…');
    try {
      const url = `https://sheets.googleapis.com/v4/spreadsheets/${SPREADSHEET_ID}/values/${encodeURIComponent(RANGE)}?key=${API_KEY}`;
      console.log('Fetching:', url);
      const res  = await fetch(url);
      const json = await res.json();
      console.log('Response:', json);
      if (!res.ok) throw new Error(json.error?.message || `HTTP ${res.status}`);
      const vals = json.values || [];
      console.log('Raw values:', vals);
      if (!vals.length) throw new Error('Sheet returned no data');
      const headers = vals[0] || [];
      const rows = vals.slice(1).filter(r => r && r.some(v => v));
      console.log('Headers count:', headers.length, 'Headers:', headers);
      console.log('Data rows:', rows.length);
      if (!rows.length) throw new Error('No data rows found');
      renderTable(headers, rows);
      setDot('ok'); setStatus(`${rows.length} rows loaded`);
    } catch (err) {
      console.error('Error:', err.message);
      renderTable([], []);
      setDot('warn'); setStatus(`Error: ${err.message}`);
    }
  }

  function renderTable(headers, rows) {
    console.log('Rendering table with', headers.length, 'columns');
    const headerHtml = '<tr>' + headers.map((h, i) => {
      console.log('Column', i, ':', h);
      return `<th>${esc(h)}</th>`;
    }).join('') + '</tr>';
    document.getElementById('thead').innerHTML = headerHtml;

    const rowsHtml = rows.map((row, rowIdx) => {
      const cells = headers.map((_, i) => {
        const v = row[i] ?? '';
        return `<td>${esc(v)}</td>`;
      }).join('');
      return `<tr>${cells}</tr>`;
    }).join('');

    document.getElementById('tbody').innerHTML = rowsHtml || '<tr><td colspan="5" style="text-align:center; color:#999;">No data available</td></tr>';
    console.log('Table rendered with', rows.length, 'rows and', headers.length, 'columns');
    document.getElementById('rowCount').textContent = rows.length ? `${rows.length} rows × ${headers.length} columns` : 'No data';
  }

  function setDot(s) {
    document.getElementById('dot').className =
      'dot' + (s === 'spin' ? ' spin' : s === 'warn' ? ' warn' : '');
  }
  function setStatus(msg) { document.getElementById('statusMsg').textContent = msg; }
  function esc(s) {
    return String(s ?? '')
      .replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;');
  }

  loadData();
</script>
</body>
</html>
