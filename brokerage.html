<!DOCTYPE html>
<html lang="zh-Hant">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Brokerage Ranking</title>
  <link rel="stylesheet" href="style.css">
</head>
<body>
<header>
  <h1>Brokerage Ranking</h1>
  <sub id="headerSub">OtherNote › brokerage | Day trading top 10 stocks</sub>
</header>
<div class="statusbar">
  <div class="dot" id="dot"></div>
  <span id="statusMsg">Loading…</span>
</div>
<main>
  <div class="card">
    <div class="card-head">
      <h2>Brokerage Ranking</h2>
      <span id="rowCount"></span>
    </div>
    <div class="tbl-wrap">
      <table>
        <thead id="thead"></thead>
        <tbody id="tbody"></tbody>
      </table>
    </div>
  </div>
</main>
<footer>Data source: Google Sheets › brokerage (read-only)</footer>

<script>
  const API_KEY        = 'AIzaSyCQjHQbMlSYHLWWFNhqCwy4u3zisCyknqo';
  const SPREADSHEET_ID = '1pljY-of-ICBP8WQVgg8l5ICSpL3F6rMs3B8XJXdP2t4';
  const RANGE          = 'brokerage!A1:E12';

  async function loadData() {
    setDot('spin'); setStatus('Loading data from Google Sheets…');
    try {
      const url = 'https://sheets.googleapis.com/v4/spreadsheets/' + SPREADSHEET_ID +
                  '/values/' + encodeURIComponent(RANGE) + '?key=' + API_KEY;
      const res  = await fetch(url);
      const json = await res.json();
      if (!res.ok) throw new Error(json.error && json.error.message || 'HTTP ' + res.status);
      const vals = json.values || [];
      if (vals.length < 3) throw new Error('No data');

      // Date is in B1 (row 0, index 1)
      var row1 = vals[0] || [];
      var date = '';
      for (var i = 0; i < row1.length; i++) {
        if (row1[i] && row1[i].length >= 8) { date = row1[i]; break; }
      }
      if (date) {
        document.getElementById('headerSub').textContent =
          'OtherNote › brokerage | Day trading top 10 stocks | ' + date;
        document.title = 'Brokerage Ranking ' + date;
      }

      var headers = vals[1] || [];
      var rows = vals.slice(2).filter(function(r) {
        return r && r.some(function(v) { return v; });
      });
      if (!headers.length) throw new Error('No headers');
      if (!rows.length) throw new Error('No data rows');
      renderTable(headers, rows);
      setDot('ok');
      setStatus(rows.length + ' rows loaded' + (date ? ' · ' + date : ''));
    } catch (err) {
      renderTable([], []);
      setDot('warn'); setStatus('Error: ' + err.message);
    }
  }

  function renderTable(headers, rows) {
    var th = '<tr>';
    for (var i = 0; i < headers.length; i++) th += '<th>' + esc(headers[i]) + '</th>';
    th += '</tr>';
    document.getElementById('thead').innerHTML = th;

    var tb = '';
    for (var r = 0; r < rows.length; r++) {
      tb += '<tr>';
      for (var c = 0; c < headers.length; c++) {
        tb += '<td>' + esc(rows[r][c] || '') + '</td>';
      }
      tb += '</tr>';
    }
    document.getElementById('tbody').innerHTML =
      tb || '<tr><td colspan="5" style="text-align:center;color:#999;">No data available</td></tr>';
    document.getElementById('rowCount').textContent =
      rows.length ? rows.length + ' rows × ' + headers.length + ' columns' : 'No data';
  }

  function setDot(s) {
    document.getElementById('dot').className =
      'dot' + (s === 'spin' ? ' spin' : s === 'warn' ? ' warn' : '');
  }
  function setStatus(msg) { document.getElementById('statusMsg').textContent = msg; }
  function esc(s) {
    return String(s || '')
      .replace(/&/g, '&amp;').replace(/</g, '&lt;').replace(/>/g, '&gt;').replace(/"/g, '&quot;');
  }

  loadData();
</script>
</body>
</html>
