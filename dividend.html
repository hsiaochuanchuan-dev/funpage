<!DOCTYPE html>
<html lang="zh-TW">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Grace — Dividend</title>
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    body {
      font-family: 'Segoe UI', -apple-system, sans-serif;
      background: #f0f2f5; min-height: 100vh;
      display: flex; flex-direction: column;
    }
    header {
      background: linear-gradient(135deg, #1a73e8 0%, #0d47a1 100%);
      color: white; padding: 16px 24px; flex-shrink: 0;
    }
    header h1  { font-size: 20px; font-weight: 500; }
    header sub { font-size: 12px; opacity: .85; display: block; margin-top: 2px; }
    .statusbar {
      background: white; border-bottom: 1px solid #e0e0e0;
      padding: 7px 24px; display: flex; align-items: center;
      gap: 10px; font-size: 13px; color: #5f6368; flex-shrink: 0;
    }
    .dot { width: 8px; height: 8px; border-radius: 50%; background: #34a853; }
    .dot.spin { background: #fbbc04; animation: blink 1s infinite; }
    .dot.warn { background: #ff9800; }
    @keyframes blink { 0%,100%{opacity:1} 50%{opacity:.3} }
    main { flex: 1; padding: 20px 24px; overflow: auto; }
    .card {
      background: white; border-radius: 10px;
      box-shadow: 0 1px 4px rgba(0,0,0,.12); overflow: hidden;
    }
    .card-head {
      padding: 13px 20px; border-bottom: 2px solid #1a73e8;
      display: flex; justify-content: space-between; align-items: center;
    }
    .card-head h2 { font-size: 14px; font-weight: 700; color: #202124; text-transform: uppercase; letter-spacing: .4px; }
    .card-head span { font-size: 12px; color: #5f6368; }
    .tbl-wrap { overflow-x: auto; }
    table { width: 100%; border-collapse: collapse; }
    thead tr { background: #e8f0fe; }
    th {
      padding: 10px 12px; text-align: left;
      font-size: 12px; font-weight: 700; color: #1a73e8;
      white-space: nowrap; border-right: 1px solid #c5d8fb;
    }
    th:last-child { border-right: none; }
    td {
      padding: 9px 12px; font-size: 14px; color: #202124;
      border-bottom: 1px solid #e8eaed; border-right: 1px solid #e8eaed;
      white-space: nowrap;
    }
    td:last-child { border-right: none; }
    tr:nth-child(even) td { background: #fafafa; }
    tr:hover td { background: #f1f8fe; }
    tr.summary-row td { background: #fce4ec; color: #880e4f; font-weight: 600; }
    tr.summary-row:hover td { background: #f8bbd0; }
    td.posted { color: #388e3c; font-weight: 600; font-size: 12px; }
    footer {
      background: white; border-top: 1px solid #e0e0e0;
      padding: 10px 24px; font-size: 12px; color: #9aa0a6; flex-shrink: 0;
    }
    #seasonal-fruit {
      position: fixed; bottom: 18px; left: 18px;
      z-index: 999; pointer-events: none;
      animation: fruit-bob 2.8s ease-in-out infinite;
    }
    #seasonal-fruit .fruit-label {
      text-align: center; font-size: 11px; color: #5f6368;
      margin-top: 4px; font-weight: 600; letter-spacing: .3px;
    }
    @keyframes fruit-bob { 0%,100%{transform:translateY(0)} 50%{transform:translateY(-8px)} }
  </style>
</head>
<body>

<header>
  <h1>Grace — Dividend Tracker</h1>
  <sub>OtherNote.xlsx › dividend &nbsp;|&nbsp; A1:G10 &nbsp;|&nbsp; Read-only</sub>
</header>

<div class="statusbar">
  <div class="dot" id="dot"></div>
  <span id="statusMsg">Loading…</span>
</div>

<main>
  <div class="card">
    <div class="card-head">
      <h2>Dividend</h2>
      <span id="rowCount"></span>
    </div>
    <div class="tbl-wrap">
      <table>
        <thead id="thead"></thead>
        <tbody id="tbody"></tbody>
      </table>
    </div>
  </div>
</main>

<footer>Data source: Google Sheets › dividend (read-only)</footer>
<div id="seasonal-fruit"></div>

<script>
  const API_KEY        = 'AIzaSyCQjHQbMlSYHLWWFNhqCwy4u3zisCyknqo';
  const SPREADSHEET_ID = '1JgVO35PwZYDHnzjR22-SgTx6PvrXpAkV';
  const RANGE          = 'dividend!A1:G10';

  const SEED = [
    ['Institution', 'Product', 'Funding', 'Monthly Average', 'ROI%', 'Frequency', '已過帳'],
    ['HSBC',       '聯博',     '$146,500',   '$1,192',  '9.8%',  '每月初',       '202604'],
    ['',           '富蘭克林', '$83,500',    '$702',    '10.1%', '1,4,7,11月初', '202604'],
    ['',           'TWD',      '$7,130,000', '$58,693', '',      '',             ''],
    ['富貴角10號', '0056',     '$2,276,211', '$17,320', '9.1%',  '2,5,8,11月中', '202602'],
    ['',           '00900',    '$2,302,927', '$12,000', '6.3%',  '每月20日',     '202603'],
    ['',           '00919',    '$701,882',   '$23,400', '13%',   '1,4,7,10月中', '202604'],
    ['',           '台積電',   '$1,261,505', '',        '',      '',             ''],
    ['',           'TWD',      '$6,542,525', '$52,720', '',      '',             ''],
    ['新光',       'Deposit',  '$6,631,000', '',        '',      '',             ''],
  ];

  async function loadData() {
    setDot('spin'); setStatus('Loading data from Google Sheets…');
    try {
      const url = `https://sheets.googleapis.com/v4/spreadsheets/${SPREADSHEET_ID}/values/${encodeURIComponent(RANGE)}?key=${API_KEY}`;
      const res  = await fetch(url);
      const json = await res.json();
      if (!res.ok) throw new Error(json.error?.message || `HTTP ${res.status}`);
      const vals = json.values || [];
      if (!vals.length) throw new Error('Sheet returned no data');
      renderTable(vals);
      setDot('ok'); setStatus(`${vals.length - 1} rows loaded from Google Sheets`);
    } catch (err) {
      renderTable(SEED);
      setDot('warn'); setStatus(`Showing cached data (${err.message})`);
    }
  }

  function renderTable(data) {
    const cols     = data[0];
    const rows     = data.slice(1);
    const prodIdx  = cols.findIndex(c => /product/i.test(c));
    const postedIdx = cols.findIndex(c => /已過帳/.test(c));
    const SUMMARY  = ['TWD', 'Deposit', 'Available'];

    document.getElementById('thead').innerHTML =
      '<tr>' + cols.map(h => `<th>${esc(h)}</th>`).join('') + '</tr>';

    document.getElementById('tbody').innerHTML = rows.map(row => {
      const product   = (row[prodIdx] ?? '').trim();
      const isSummary = SUMMARY.includes(product);
      const cells = cols.map((_, i) => {
        const v   = row[i] ?? '';
        const cls = i === postedIdx && v ? ' class="posted"' : '';
        return `<td${cls}>${esc(v)}</td>`;
      }).join('');
      return `<tr${isSummary ? ' class="summary-row"' : ''}>${cells}</tr>`;
    }).join('');

    document.getElementById('rowCount').textContent = rows.length + ' rows';
  }

  function setDot(s) {
    document.getElementById('dot').className =
      'dot' + (s === 'spin' ? ' spin' : s === 'warn' ? ' warn' : '');
  }
  function setStatus(msg) { document.getElementById('statusMsg').textContent = msg; }
  function esc(s) {
    return String(s ?? '')
      .replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;');
  }

  loadData();

  /* ── Seasonal fruit ── */
  (function () {
    const W = 100, H = 130;
    const SVG_NS = 'http://www.w3.org/2000/svg';

    function el(tag, attrs, ...kids) {
      const e = document.createElementNS(SVG_NS, tag);
      Object.entries(attrs || {}).forEach(([k, v]) => e.setAttribute(k, v));
      kids.forEach(k => k && e.appendChild(k));
      return e;
    }

    function svg() { return el('svg', {width:W, height:H, viewBox:`0 0 ${W} ${H}`}); }

    function rg(id, cx, cy, r, stops) {
      const g = el('radialGradient', {id, cx, cy, r, gradientUnits:'userSpaceOnUse'});
      stops.forEach(([off, col, op]) =>
        g.appendChild(el('stop', {'offset':off,'stop-color':col,'stop-opacity':op ?? 1})));
      return g;
    }

    function lg(id, x1, y1, x2, y2, stops) {
      const g = el('linearGradient', {id, x1, y1, x2, y2, gradientUnits:'userSpaceOnUse'});
      stops.forEach(([off, col, op]) =>
        g.appendChild(el('stop', {'offset':off,'stop-color':col,'stop-opacity':op ?? 1})));
      return g;
    }

    function shine(cx, cy, rx, ry, rot) {
      return el('ellipse', {cx, cy, rx, ry,
        transform: rot ? `rotate(${rot},${cx},${cy})` : '',
        fill:'white', opacity:.28});
    }

    const fruits = {

      /* ── Jan / Feb / Dec : Strawberry ── */
      1: { label:'草莓 Strawberry', draw() {
        const s = svg();
        const defs = el('defs');
        defs.appendChild(rg('sg','42','68','44', [['0','#ff6060'],['0.5','#e8202a'],['1','#a01020']]));
        defs.appendChild(rg('lg','40','30','12', [['0','#55cc44'],['1','#226611']]));
        s.appendChild(defs);
        // calyx leaves
        [  ['M50 36 Q56 14 62 18 Q58 30 50 36Z','#4caf50'],
           ['M50 36 Q68 22 70 30 Q62 36 50 36Z','#388e3c'],
           ['M50 36 Q44 14 38 18 Q42 30 50 36Z','#4caf50'],
           ['M50 36 Q32 22 30 30 Q38 36 50 36Z','#388e3c'],
           ['M50 36 Q50 12 54 16 Q52 28 50 36Z','#66bb6a'],
        ].forEach(([d,fill]) => s.appendChild(el('path',{d,fill})));
        // stem
        s.appendChild(el('line',{x1:50,y1:14,x2:52,y2:4,stroke:'#5d4037','stroke-width':2.5,'stroke-linecap':'round'}));
        // body — heart-like strawberry shape
        s.appendChild(el('path',{d:'M50 40 Q72 42 75 68 Q73 96 50 118 Q27 96 25 68 Q28 42 50 40Z', fill:'url(#sg)'}));
        // seeds
        [[38,56],[50,50],[62,56],[34,70],[46,65],[58,67],[70,70],[36,84],[50,80],[63,82],[40,97],[54,94]].forEach(([x,y])=>
          s.appendChild(el('ellipse',{cx:x,cy:y,rx:2.2,ry:2.8,fill:'#f5e642',stroke:'#c8b800','stroke-width':.4})));
        // shine
        s.appendChild(shine(38,54,8,5,-30));
        return s;
      }},

      /* ── Mar : Wax Apple 蓮霧 ── */
      3: { label:'蓮霧 Wax Apple', draw() {
        const s = svg();
        const defs = el('defs');
        defs.appendChild(rg('wg','42','65','40', [['0','#ff8fa8'],['0.45','#e8355a'],['1','#8b0a2a']]));
        defs.appendChild(lg('stemg','50','0','50','20', [['0','#5d4037'],['1','#8d6e63']]));
        s.appendChild(defs);
        s.appendChild(el('line',{x1:50,y1:2,x2:50,y2:20,stroke:'url(#stemg)','stroke-width':3,'stroke-linecap':'round'}));
        // leaf
        s.appendChild(el('path',{d:'M50 10 Q68 2 70 14 Q60 20 50 12Z', fill:'#43a047'}));
        s.appendChild(el('path',{d:'M50 10 Q34 4 32 14 Q42 18 50 12Z', fill:'#388e3c'}));
        // bell body
        s.appendChild(el('path',{d:'M50 22 Q70 24 76 58 Q80 84 70 104 Q62 120 50 122 Q38 120 30 104 Q20 84 24 58 Q30 24 50 22Z', fill:'url(#wg)'}));
        // dimple top
        s.appendChild(el('ellipse',{cx:50,cy:26,rx:10,ry:6,fill:'#9b1030',opacity:.5}));
        // crown petals at bottom
        s.appendChild(el('path',{d:'M36 116 Q40 108 44 116 Q48 108 52 116 Q56 108 60 116 Q64 108 68 116',
          fill:'none',stroke:'#9b1030','stroke-width':2.2,'stroke-linecap':'round','stroke-linejoin':'round'}));
        s.appendChild(shine(38,48,9,6,-25));
        return s;
      }},

      /* ── Apr : Pineapple 鳳梨 ── */
      4: { label:'鳳梨 Pineapple', draw() {
        const s = svg();
        const defs = el('defs');
        const clip = el('clipPath',{id:'pc2'});
        clip.appendChild(el('ellipse',{cx:50,cy:82,rx:32,ry:40}));
        defs.appendChild(clip);
        defs.appendChild(rg('pg','40','68','38', [['0','#ffe066'],['0.5','#f5c430'],['1','#b8760a']]));
        s.appendChild(defs);
        // crown leaves — layered for depth
        const crownLeaves = [
          {d:'M50 44 Q38 10 34 4 Q40 12 50 44Z', f:'#1b5e20'},
          {d:'M50 44 Q62 10 66 4 Q60 12 50 44Z', f:'#1b5e20'},
          {d:'M50 42 Q42 14 36 10 Q43 18 50 42Z', f:'#2e7d32'},
          {d:'M50 42 Q58 14 64 10 Q57 18 50 42Z', f:'#2e7d32'},
          {d:'M50 40 Q46 18 42 16 Q47 22 50 40Z', f:'#388e3c'},
          {d:'M50 40 Q54 18 58 16 Q53 22 50 40Z', f:'#388e3c'},
          {d:'M50 38 Q50 16 50 12 Q52 22 50 38Z', f:'#43a047'},
          {d:'M50 40 Q32 22 26 20 Q34 26 50 40Z', f:'#2e7d32'},
          {d:'M50 40 Q68 22 74 20 Q66 26 50 40Z', f:'#2e7d32'},
        ];
        crownLeaves.forEach(({d,f}) => s.appendChild(el('path',{d,fill:f})));
        // body
        s.appendChild(el('ellipse',{cx:50,cy:82,rx:32,ry:40,fill:'url(#pg)'}));
        // scale grid clipped
        const g = el('g',{'clip-path':'url(#pc2)'});
        for(let i=-4;i<10;i++){
          g.appendChild(el('line',{x1:-10,y1:42+i*13,x2:110,y2:42+i*13+120,stroke:'#9a6500','stroke-width':1}));
          g.appendChild(el('line',{x1:-10,y1:42+i*13+120,x2:110,y2:42+i*13,stroke:'#9a6500','stroke-width':1}));
        }
        // scale dots at intersections for realism
        for(let i=0;i<6;i++) for(let j=0;j<5;j++)
          g.appendChild(el('circle',{cx:22+j*16,cy:50+i*13+(j%2)*6.5,r:2,fill:'#7a4f00',opacity:.4}));
        s.appendChild(g);
        // highlight
        s.appendChild(shine(38,64,10,7,-20));
        return s;
      }},

      /* ── May : Mango 芒果 ── */
      5: { label:'芒果 Mango', draw() {
        const s = svg();
        const defs = el('defs');
        defs.appendChild(rg('mg','44','72','46', [['0','#ffe066'],['0.4','#f5a623'],['0.8','#e85d20'],['1','#8b3a00']]));
        defs.appendChild(lg('blushlg','58','40','82','70', [['0','#e8352a'],['1','#e8352a',0]]));
        s.appendChild(defs);
        // stem
        s.appendChild(el('line',{x1:52,y1:10,x2:54,y2:2,stroke:'#5d4037','stroke-width':2.5,'stroke-linecap':'round'}));
        // leaf
        s.appendChild(el('path',{d:'M52 8 Q72 0 74 12 Q64 18 52 10Z',fill:'#43a047'}));
        s.appendChild(el('path',{d:'M52 8 L63 6',fill:'none',stroke:'#2e7d32','stroke-width':.8}));
        // body — kidney/oval mango shape
        s.appendChild(el('path',{d:'M52 18 Q30 22 22 52 Q16 80 28 104 Q38 120 52 122 Q68 120 78 106 Q90 88 86 62 Q82 38 68 26 Q62 18 52 18Z', fill:'url(#mg)'}));
        // red blush
        s.appendChild(el('path',{d:'M52 18 Q30 22 22 52 Q16 80 28 104 Q38 120 52 122 Q68 120 78 106 Q90 88 86 62 Q82 38 68 26 Q62 18 52 18Z', fill:'url(#blushlg)',opacity:.45}));
        // shine
        s.appendChild(shine(36,42,10,6,-30));
        return s;
      }},

      /* ── Jun : Lychee 荔枝 ── */
      6: { label:'荔枝 Lychee', draw() {
        const s = svg();
        const defs = el('defs');
        defs.appendChild(rg('lyg','42','62','42', [['0','#ff6680'],['0.5','#cc1a30'],['1','#6b0010']]));
        s.appendChild(defs);
        s.appendChild(el('line',{x1:50,y1:8,x2:50,y2:24,stroke:'#5d4037','stroke-width':2.5,'stroke-linecap':'round'}));
        s.appendChild(el('path',{d:'M50 14 Q66 6 68 18 Q58 24 50 16Z',fill:'#43a047'}));
        // body
        s.appendChild(el('circle',{cx:50,cy:72,r:42,fill:'url(#lyg)'}));
        // bumpy skin texture
        [[32,52],[50,44],[68,52],[24,68],[40,62],[58,62],[74,68],
         [28,84],[44,78],[62,80],[76,84],[34,96],[52,92],[68,96]].forEach(([x,y])=>{
          s.appendChild(el('circle',{cx:x,cy:y,r:7,fill:'none',stroke:'#8b001a','stroke-width':1.2,opacity:.6}));
          s.appendChild(el('circle',{cx:x,cy:y,r:3.5,fill:'#a01a28',opacity:.5}));
        });
        s.appendChild(shine(36,52,11,7,-25));
        return s;
      }},

      /* ── Jul : Longan 龍眼 ── */
      7: { label:'龍眼 Longan', draw() {
        const s = svg();
        const defs = el('defs');
        defs.appendChild(rg('long1','18','72','15',[['0','#e8c880'],['0.6','#c8a040'],['1','#8b6418']]));
        defs.appendChild(rg('long2','44','58','15',[['0','#e8c880'],['0.6','#c8a040'],['1','#8b6418']]));
        defs.appendChild(rg('long3','70','70','15',[['0','#e8c880'],['0.6','#c8a040'],['1','#8b6418']]));
        defs.appendChild(rg('long4','36','92','13',[['0','#e8c880'],['0.6','#c8a040'],['1','#8b6418']]));
        defs.appendChild(rg('long5','62','94','13',[['0','#e8c880'],['0.6','#c8a040'],['1','#8b6418']]));
        s.appendChild(defs);
        // branch stems
        [ [50,4,50,30],[50,22,28,42],[50,22,50,44],[50,22,72,42],
          [28,42,18,58],[28,42,36,58],[72,42,76,58] ].forEach(([x1,y1,x2,y2])=>
          s.appendChild(el('line',{x1,y1,x2,y2,stroke:'#6d4c41','stroke-width':2,'stroke-linecap':'round'})));
        // leaf at top
        s.appendChild(el('path',{d:'M50 8 Q62 2 64 12 Q56 18 50 10Z',fill:'#43a047'}));
        // fruit clusters
        [[18,72,15,'long1'],[44,58,15,'long2'],[70,70,15,'long3'],[36,92,13,'long4'],[62,94,13,'long5']].forEach(([cx,cy,r,gid])=>{
          s.appendChild(el('circle',{cx,cy,r,fill:`url(#${gid})`}));
          // eye mark
          s.appendChild(el('circle',{cx,cy,r:r*.45,fill:'#5d3a10',opacity:.35}));
          s.appendChild(el('ellipse',{cx:cx-r*.25,cy:cy-r*.25,rx:r*.22,ry:r*.15,fill:'white',opacity:.35}));
        });
        return s;
      }},

      /* ── Aug : Guava 芭樂 ── */
      8: { label:'芭樂 Guava', draw() {
        const s = svg();
        const defs = el('defs');
        defs.appendChild(rg('gg','42','66','44',[['0','#ddf066'],['0.5','#a8c820'],['1','#5a7800']]));
        s.appendChild(defs);
        s.appendChild(el('line',{x1:50,y1:6,x2:50,y2:20,stroke:'#5d4037','stroke-width':2.5,'stroke-linecap':'round'}));
        s.appendChild(el('path',{d:'M50 12 Q66 4 68 16 Q58 22 50 14Z',fill:'#43a047'}));
        // body
        s.appendChild(el('circle',{cx:50,cy:72,r:44,fill:'url(#gg)'}));
        // lighter patch
        s.appendChild(el('ellipse',{cx:58,cy:62,rx:22,ry:18,fill:'#c8e040',opacity:.5}));
        // flower-end star at bottom
        const starPts = [0,1,2,3,4].map(i=>{
          const a1 = (i*72-90)*Math.PI/180, a2 = ((i*72+36)-90)*Math.PI/180;
          return `L${(50+11*Math.cos(a1)).toFixed(1)} ${(108+11*Math.sin(a1)).toFixed(1)} L${(50+6*Math.cos(a2)).toFixed(1)} ${(108+6*Math.sin(a2)).toFixed(1)}`;
        }).join(' ');
        s.appendChild(el('path',{d:'M50 108 '+starPts+'Z',fill:'#7a9a10'}));
        s.appendChild(el('circle',{cx:50,cy:108,r:5,fill:'#ffccdd',opacity:.8}));
        s.appendChild(shine(36,52,11,7,-25));
        return s;
      }},

      /* ── Sep : Pomelo 柚子 ── */
      9: { label:'柚子 Pomelo', draw() {
        const s = svg();
        const defs = el('defs');
        defs.appendChild(rg('pog','42','72','50',[['0','#f5f080'],['0.5','#d4d820'],['1','#8a9000']]));
        defs.appendChild(rg('peelg','42','72','50',[['0','#f5f080',0],['0.75','#d4d820',0],['0.85','#b8c010',.6],['1','#8a9000',.8]]));
        s.appendChild(defs);
        s.appendChild(el('line',{x1:50,y1:4,x2:50,y2:18,stroke:'#5d4037','stroke-width':3,'stroke-linecap':'round'}));
        s.appendChild(el('path',{d:'M50 10 Q68 2 70 14 Q60 20 50 12Z',fill:'#43a047'}));
        // outer peel (thick)
        s.appendChild(el('ellipse',{cx:50,cy:76,rx:44,ry:46,fill:'url(#pog)'}));
        // inner fruit visible as lighter center
        s.appendChild(el('ellipse',{cx:50,cy:76,rx:34,ry:36,fill:'#eef060',opacity:.6}));
        // peel ring
        s.appendChild(el('ellipse',{cx:50,cy:76,rx:44,ry:46,fill:'none',stroke:'#a0a800','stroke-width':3,opacity:.4}));
        // navel top
        s.appendChild(el('ellipse',{cx:50,cy:30,rx:11,ry:8,fill:'#c8ca10',opacity:.5}));
        s.appendChild(shine(34,56,14,8,-20));
        return s;
      }},

      /* ── Oct : Persimmon 柿子 ── */
      10: { label:'柿子 Persimmon', draw() {
        const s = svg();
        const defs = el('defs');
        defs.appendChild(rg('prg','40','68','46',[['0','#ffcc44'],['0.4','#f57c2a'],['0.85','#c84010'],['1','#7a2000']]));
        s.appendChild(defs);
        s.appendChild(el('line',{x1:50,y1:8,x2:52,y2:2,stroke:'#5d4037','stroke-width':2.5,'stroke-linecap':'round'}));
        // 4-leaf calyx
        [  ['M50 24 Q34 14 30 24 Q38 32 50 26Z','#4caf50'],
           ['M50 24 Q66 14 70 24 Q62 32 50 26Z','#388e3c'],
