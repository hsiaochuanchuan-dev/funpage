<!DOCTYPE html>
<html lang="zh-TW">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Grace — Dividend</title>
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    body {
      font-family: 'Segoe UI', -apple-system, sans-serif;
      background: #f0f2f5; min-height: 100vh;
      display: flex; flex-direction: column;
    }
    header {
      background: linear-gradient(135deg, #1a73e8 0%, #0d47a1 100%);
      color: white; padding: 16px 24px; flex-shrink: 0;
    }
    header h1  { font-size: 20px; font-weight: 500; }
    header sub { font-size: 12px; opacity: .85; display: block; margin-top: 2px; }
    .statusbar {
      background: white; border-bottom: 1px solid #e0e0e0;
      padding: 7px 24px; display: flex; align-items: center;
      gap: 10px; font-size: 13px; color: #5f6368; flex-shrink: 0;
    }
    .dot { width: 8px; height: 8px; border-radius: 50%; background: #34a853; }
    .dot.spin { background: #fbbc04; animation: blink 1s infinite; }
    .dot.warn { background: #ff9800; }
    @keyframes blink { 0%,100%{opacity:1} 50%{opacity:.3} }
    main { flex: 1; padding: 20px 24px; overflow: auto; }
    .card {
      background: white; border-radius: 10px;
      box-shadow: 0 1px 4px rgba(0,0,0,.12); overflow: hidden;
    }
    .card-head {
      padding: 13px 20px; border-bottom: 2px solid #1a73e8;
      display: flex; justify-content: space-between; align-items: center;
    }
    .card-head h2 { font-size: 14px; font-weight: 700; color: #202124; text-transform: uppercase; letter-spacing: .4px; }
    .card-head span { font-size: 12px; color: #5f6368; }
    .tbl-wrap { overflow-x: auto; }
    table { width: 100%; border-collapse: collapse; }
    thead tr { background: #e8f0fe; }
    th {
      padding: 10px 12px; text-align: left;
      font-size: 12px; font-weight: 700; color: #1a73e8;
      white-space: nowrap; border-right: 1px solid #c5d8fb;
    }
    th:last-child { border-right: none; }
    td {
      padding: 9px 12px; font-size: 14px; color: #202124;
      border-bottom: 1px solid #e8eaed; border-right: 1px solid #e8eaed;
      white-space: nowrap;
    }
    td:last-child { border-right: none; }
    tr:nth-child(even) td { background: #fafafa; }
    tr:hover td { background: #f1f8fe; }
    tr.summary-row td { background: #fce4ec; color: #880e4f; font-weight: 600; }
    tr.summary-row:hover td { background: #f8bbd0; }
    td.posted { color: #388e3c; font-weight: 600; font-size: 12px; }
    footer {
      background: white; border-top: 1px solid #e0e0e0;
      padding: 10px 24px; font-size: 12px; color: #9aa0a6; flex-shrink: 0;
    }
    #seasonal-fruit {
      position: fixed; bottom: 18px; left: 18px;
      z-index: 999; pointer-events: none;
      animation: fruit-bob 2.8s ease-in-out infinite;
      text-align: center;
    }
    #seasonal-fruit .fruit-label {
      font-size: 11px; color: #5f6368;
      margin-top: 4px; font-weight: 600; letter-spacing: .3px;
    }
    @keyframes fruit-bob { 0%,100%{transform:translateY(0)} 50%{transform:translateY(-8px)} }
  </style>
</head>
<body>

<header>
  <h1>Grace — Dividend Tracker</h1>
  <sub>OtherNote.xlsx › dividend &nbsp;|&nbsp; A1:I10 &nbsp;|&nbsp; Read-only</sub>
</header>

<div class="statusbar">
  <div class="dot" id="dot"></div>
  <span id="statusMsg">Loading…</span>
</div>

<main>
  <div class="card">
    <div class="card-head">
      <h2>Dividend</h2>
      <span id="rowCount"></span>
    </div>
    <div class="tbl-wrap">
      <table>
        <thead id="thead"></thead>
        <tbody id="tbody"></tbody>
      </table>
    </div>
  </div>
</main>

<footer>Data source: Google Sheets › dividend (read-only)</footer>
<div id="seasonal-fruit"></div>

<script>
  const API_KEY        = 'AIzaSyCQjHQbMlSYHLWWFNhqCwy4u3zisCyknqo';
  const SPREADSHEET_ID = '1pljY-of-ICBP8WQVgg8l5ICSpL3F6rMs3B8XJXdP2t4';
  const RANGE          = 'dividend!A1:I10';

  const SEED = [
    ['Institution', 'Product', 'Funding', 'Monthly Average', 'ROI%', 'Frequency', '已過帳'],
    ['HSBC',       '聯博',     '$146,500',   '$1,192',  '9.8%',  '每月初',       '202604'],
    ['',           '富蘭克林', '$83,500',    '$702',    '10.1%', '1,4,7,11月初', '202604'],
    ['',           'TWD',      '$7,130,000', '$58,693', '',      '',             ''],
    ['富貴角10號', '0056',     '$2,276,211', '$17,320', '9.1%',  '2,5,8,11月中', '202602'],
    ['',           '00900',    '$2,302,927', '$12,000', '6.3%',  '每月20日',     '202603'],
    ['',           '00919',    '$701,882',   '$23,400', '13%',   '1,4,7,10月中', '202604'],
    ['',           '台積電',   '$1,261,505', '',        '',      '',             ''],
    ['',           'TWD',      '$6,542,525', '$52,720', '',      '',             ''],
  ];

  async function loadData() {
    setDot('spin'); setStatus('Loading data from Google Sheets…');
    try {
      const url = `https://sheets.googleapis.com/v4/spreadsheets/${SPREADSHEET_ID}/values/${encodeURIComponent(RANGE)}?key=${API_KEY}`;
      const res  = await fetch(url);
      const json = await res.json();
      if (!res.ok) throw new Error(json.error?.message || `HTTP ${res.status}`);
      const vals = (json.values || []).slice(0, 10);
      if (!vals.length) throw new Error('Sheet returned no data');
      renderTable(vals);
      setDot('ok'); setStatus(`${vals.length - 1} rows loaded from Google Sheets`);
    } catch (err) {
      renderTable(SEED.slice(0, 10));
      setDot('warn'); setStatus(`Showing cached data (${err.message})`);
    }
  }

  function renderTable(data) {
    const cols      = data[0];
    const rows      = data.slice(1);
    const prodIdx   = cols.findIndex(c => /product/i.test(c));
    const postedIdx = cols.findIndex(c => /已過帳/.test(c));
    const SUMMARY   = ['TWD', 'Deposit', 'Available'];

    document.getElementById('thead').innerHTML =
      '<tr>' + cols.map(h => `<th>${esc(h)}</th>`).join('') + '</tr>';

    document.getElementById('tbody').innerHTML = rows.map(row => {
      const product   = (row[prodIdx] ?? '').trim();
      const isSummary = SUMMARY.includes(product);
      const cells = cols.map((_, i) => {
        const v   = row[i] ?? '';
        const cls = i === postedIdx && v ? ' class="posted"' : '';
        return `<td${cls}>${esc(v)}</td>`;
      }).join('');
      return `<tr${isSummary ? ' class="summary-row"' : ''}>${cells}</tr>`;
    }).join('');

    document.getElementById('rowCount').textContent = rows.length + ' rows';
  }

  function setDot(s) {
    document.getElementById('dot').className =
      'dot' + (s === 'spin' ? ' spin' : s === 'warn' ? ' warn' : '');
  }
  function setStatus(msg) { document.getElementById('statusMsg').textContent = msg; }
  function esc(s) {
    return String(s ?? '')
      .replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;');
  }

  loadData();

  /* ── Seasonal fruit image ── */
  (function () {
    const fruits = {
      1:  { img:'JPG/01.jpg', label:'橘子' },
      2:  { img:'JPG/02.jpg', label:'芭樂' },
      3:  { img:'JPG/03.jpg', label:'蓮霧' },
      4:  { img:'JPG/04.jpg', label:'鳳梨' },
      5:  { img:'JPG/05.jpg', label:'芒果' },
      6:  { img:'JPG/06.jpg', label:'荔枝' },
      7:  { img:'JPG/07.jpg', label:'枇杷' },
      8:  { img:'JPG/08.jpg', label:'龍眼' },
      9:  { img:'JPG/09.jpg', label:'文旦' },
      10: { img:'JPG/10.jpg', label:'葡萄' },
      11: { img:'JPG/11.jpg', label:'釋迦' },
      12: { img:'JPG/12.jpg', label:'桶柑' },
    };
    const entry = fruits[new Date().getMonth() + 1];
    const wrap  = document.getElementById('seasonal-fruit');
    const img   = document.createElement('img');
    img.src     = entry.img;
    img.style.cssText = 'width:90px; height:90px; object-fit:cover; border-radius:50%; display:block;';
    wrap.appendChild(img);
    const lbl = document.createElement('div');
    lbl.className   = 'fruit-label';
    lbl.textContent = entry.label;
    wrap.appendChild(lbl);
  })();
</script>
</body>
</html>
